<main id="main">

  <!-- PHOTO GALLERY -->
  <!--
    TO ADD YOUR PHOTOS:
    1. Put image files in the  images/gallery/  folder in your repo.
    2. For each photo, copy one <figure> block below and edit:
         - src        = path to your file (e.g. images/gallery/sunset.jpg)
         - alt        = short description (for accessibility)
         - figcaption = caption shown under the photo
    3. Delete any blocks you don't use.
    Photos are shown at a uniform height and arranged automatically.
  -->
  <section id="gallery" class="block wrap">
    <h2 class="section-head"><span class="tick">//</span> Photo gallery</h2>
    <p class="section-intro">
      Away from the bench — a few frames from things I've pointed a camera at.
    </p>

    <div class="gallery-grid">
      <figure class="gallery-item">
        <img src="images/gallery/photo1.jpg" alt="Garner State Park" loading="lazy">
        <figcaption>Garner State Park</figcaption>
      </figure>
